<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Scam Day to You</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
<main class="poster">
    <section class="hero" aria-label="Hero section">
        <div class="hero-title-wrap">
            <img class="hero-title" src="images/banner.png" alt="Happy Scam Day to You banner">
        </div>
        <div class="hero-icons">
            <img class="hero-paper" src="images/paper-letter.png" alt="Envelope and gift">
            <img class="hero-laptop" src="images/laptop.png" alt="Laptop with phishing hook">
            <img class="hero-thief" src="images/thieve.png" alt="Cartoon scammer holding money bag">
            <img class="hero-balloons" src="images/balloon-bouquet.png" alt="Balloons">
        </div>
        <div class="hero-cta-wrap">
            <a href="details.html" aria-label="Open details page">
                <img class="hero-cta" src="images/banner-2.png" alt="Congrats you've been scammed">
            </a>
        </div>
    </section>

    <section class="after-hero" aria-label="Poster content">
        <section class="cards cards-top" aria-label="Featured scam sections">
            <img src="images/scammer-hall-of-fame.png" alt="Scammer Hall of Fame card">
            <img src="images/top-scam-tactics.png" alt="Top Scam Tactics card">
            <img src="images/victim-stories.png" alt="Victim Stories card">
        </section>

        <section class="events" aria-label="Today's events">
            <div class="cards cards-events">
                <img src="images/phishing-fiesta.png" alt="Phishing Fiesta card">
                <img src="images/fake-lottery-bonanza.png" alt="Fake Lottery Bonanza card">
                <img src="images/romance-scam.png" alt="Romance Scam Soiree card">
            </div>
        </section>

        <section class="join" aria-label="Subscribe call to action">
            <a href="details.html" class="join-btn">Join the Fun! Subscribe for Scam Alerts</a>
        </section>
    </section>
</main>
</body>
</html>
