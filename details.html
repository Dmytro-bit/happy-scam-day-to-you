<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Results</title>
    <link rel="stylesheet" href="styles/details.css">
</head>
<body>
<main class="details-page">
    <header class="details-header">
        <h1>Oops… your system got leaked.</h1>
    </header>

    <section class="details-card" aria-label="Client details">
        <div class="row"><span>IP Address</span><strong id="ipAddress">Loading...</strong></div>
        <div class="row"><span>Browser</span><strong id="browser">-</strong></div>
        <div class="row"><span>Operating System</span><strong id="os">-</strong></div>
        <div class="row"><span>Language</span><strong id="language">-</strong></div>
        <div class="row"><span>Timezone</span><strong id="timezone">-</strong></div>
        <div class="row"><span>Screen Size</span><strong id="screen">-</strong></div>
        <div class="row"><span>Viewport</span><strong id="viewport">-</strong></div>
        <div class="row"><span>Device Memory</span><strong id="memory">-</strong></div>
        <div class="row"><span>CPU Cores</span><strong id="cores">-</strong></div>
        <div class="row"><span>Touch Points</span><strong id="touch">-</strong></div>
        <div class="row"><span>Online Status</span><strong id="online">-</strong></div>
        <div class="row"><span>Cookies Enabled</span><strong id="cookies">-</strong></div>
        <div class="row"><span>Referrer</span><strong id="referrer">-</strong></div>
    </section>

    <nav class="actions" aria-label="Page actions">
        <a class="btn" href="index.html">Back to Main Page</a>
    </nav>
</main>
<script src="scripts/details.js"></script>
</body>
</html>
